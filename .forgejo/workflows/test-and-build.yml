name: test-and-build

on:
  push: {}

permissions:
  contents: write
  issues: write

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:f7fe1fc6cf42b49ebd6a8e908c792c008791fc0b2c8c30ef842acdeb099f97b5
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    runs-on: forgejo

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 'Lint and test code'
        run: make go_test helm_lint

      - name: Do a quick local compile
        run: make build
