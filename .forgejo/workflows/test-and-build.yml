name: test-and-build

on:
  push: {}

permissions:
  contents: write
  issues: write

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:b955347ca73dd6f0dbc6d4b0c5ec938d4aaa3733ad8f790f5b8d77195affe2f5
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    runs-on: forgejo

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Lint and test code'
        run: make go_test helm_lint

      - name: Do a quick local compile
        run: make build
